  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  miappe_gold:
    prefix_prefix: miappe_gold
    prefix_reference: https://w3id.org/ornl/miappe-gold/
default_prefix: miappe_gold
default_range: string
