name: miappe-gold
description: 'Cleaned, conformed, one-class-per-table model of a MIAPPE 1.2 plant
  phenotyping dataset: Populus trichocarpa observed at ORNL between 2024-03-26 and
  2024-05-09. Facts are de-duplicated and carry deterministic md5 surrogate keys,
  so a reload reproduces identical identifiers.'
title: MIAPPE 1.2 Gold Layer - Weston Poplar GWAS Phenotyping Experiment
id: https://w3id.org/ornl/miappe-gold
imports:
- linkml:types
license: https://creativecommons.org/publicdomain/zero/1.0/
